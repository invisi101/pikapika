<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <!-- Background radial glow -->
    <radialGradient id="bg-glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0f0f23" stop-opacity="0"/>
    </radialGradient>
    <!-- Pink-purple gradient for main shape -->
    <linearGradient id="bolt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <!-- Cyan-green gradient for document -->
    <linearGradient id="doc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.35"/>
    </linearGradient>
    <!-- Glow filter for the bolt -->
    <filter id="neon-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.957
                0 0 0 0 0.447
                0 0 0 0 0.714
                0 0 0 0.7 0" result="pinkBlur"/>
      <feMerge>
        <feMergeNode in="pinkBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Sparkle glow -->
    <filter id="sparkle-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.204
                0 0 0 0 0.827
                0 0 0 0 0.6
                0 0 0 0.8 0" result="greenBlur"/>
      <feMerge>
        <feMergeNode in="greenBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Outer ring glow -->
    <filter id="ring-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background circle -->
  <circle cx="128" cy="128" r="120" fill="#0f0f23"/>
  <circle cx="128" cy="128" r="120" fill="url(#bg-glow)"/>

  <!-- Subtle outer ring -->
  <circle cx="128" cy="128" r="116" fill="none" stroke="#818cf8" stroke-opacity="0.2" stroke-width="1.5" filter="url(#ring-glow)"/>

  <!-- Document shape (rounded rect, slightly tilted) -->
  <g transform="translate(128,138) rotate(-6)">
    <rect x="-42" y="-56" width="84" height="108" rx="8" ry="8"
          fill="url(#doc-grad)" stroke="#818cf8" stroke-opacity="0.3" stroke-width="1.2"/>
    <!-- Metadata "lines" on document -->
    <rect x="-28" y="-38" width="40" height="4" rx="2" fill="#818cf8" opacity="0.35"/>
    <rect x="-28" y="-28" width="52" height="4" rx="2" fill="#818cf8" opacity="0.25"/>
    <rect x="-28" y="-18" width="36" height="4" rx="2" fill="#818cf8" opacity="0.2"/>
    <rect x="-28" y="-8"  width="48" height="4" rx="2" fill="#f472b6" opacity="0.2"/>
    <rect x="-28" y="2"   width="30" height="4" rx="2" fill="#818cf8" opacity="0.15"/>
    <rect x="-28" y="12"  width="44" height="4" rx="2" fill="#818cf8" opacity="0.15"/>
    <!-- "Stripped" lines (faded / crossed out) -->
    <line x1="-28" y1="26" x2="28" y2="26" stroke="#f87171" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="4,3"/>
    <line x1="-28" y1="36" x2="20" y2="36" stroke="#f87171" stroke-opacity="0.3" stroke-width="2" stroke-dasharray="4,3"/>
  </g>

  <!-- Lightning bolt (pika pika = sparkle/flash) -->
  <g filter="url(#neon-glow)">
    <path d="M 148 42 L 118 102 L 142 102 L 108 170 L 152 98 L 130 98 Z"
          fill="url(#bolt-grad)" stroke="#fff" stroke-opacity="0.3" stroke-width="0.8"/>
  </g>

  <!-- Sparkle stars -->
  <g filter="url(#sparkle-glow)">
    <!-- Top-right sparkle -->
    <path d="M 186 58 L 189 52 L 192 58 L 198 61 L 192 64 L 189 70 L 186 64 L 180 61 Z"
          fill="#34d399"/>
    <!-- Small sparkle left -->
    <path d="M 72 72 L 74 68 L 76 72 L 80 74 L 76 76 L 74 80 L 72 76 L 68 74 Z"
          fill="#34d399" opacity="0.7"/>
    <!-- Bottom sparkle -->
    <path d="M 192 168 L 194 164 L 196 168 L 200 170 L 196 172 L 194 176 L 192 172 L 188 170 Z"
          fill="#a78bfa" opacity="0.6"/>
    <!-- Tiny sparkle -->
    <path d="M 168 38 L 169.5 35 L 171 38 L 174 39.5 L 171 41 L 169.5 44 L 168 41 L 165 39.5 Z"
          fill="#f9a8d4" opacity="0.5"/>
  </g>
</svg>
